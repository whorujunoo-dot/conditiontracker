<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CONDITION">
<meta name="theme-color" content="#0a0a0f">
<title>CONDITION TRACKER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { 
    font-family: 'Noto Sans KR', sans-serif; 
    background: #0a0a0f; 
    color: #fff; 
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  
  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; min-height: 100dvh; position: relative; }
  
  /* Header */
  .header { padding: 20px 20px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-icon { font-size: 22px; }
  .header-title { font-size: 16px; font-weight: 900; letter-spacing: 3px; font-family: 'JetBrains Mono', monospace; }
  .header-sub { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 2px; letter-spacing: 1px; }
  .header-score { text-align: right; }
  .header-score-num { font-size: 28px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .header-score-label { font-size: 9px; color: rgba(255,255,255,0.4); letter-spacing: 1px; }
  
  /* Tabs */
  .tabs { display: flex; padding: 8px 16px; gap: 4px; border-bottom: 1px solid rgba(255,255,255,0.04); position: sticky; top: 0; background: #0a0a0f; z-index: 10; }
  .tab { flex: 1; padding: 10px 0; border: none; background: transparent; color: rgba(255,255,255,0.35); font-size: 12px; font-weight: 600; cursor: pointer; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 6px; font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s; }
  .tab.active { background: rgba(255,255,255,0.06); color: #fff; }
  
  /* Content */
  .content { padding: 16px; padding-bottom: 40px; }
  .content > .tab-panel { display: none; }
  .content > .tab-panel.active { display: block; }
  
  /* Cards */
  .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .card-label { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.6); margin-bottom: 8px; letter-spacing: 0.5px; }
  .card-label span { font-weight: 400; color: rgba(255,255,255,0.3); }
  
  /* Score display */
  .score-display { text-align: center; margin: 12px 0 8px; }
  .score-big { font-size: 56px; font-weight: 900; font-family: 'JetBrains Mono', monospace; line-height: 1; transition: color 0.2s; }
  .score-max { font-size: 16px; color: rgba(255,255,255,0.3); margin-left: 4px; }
  
  /* Slider */
  input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.08); outline: none; margin: 8px 0; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 28px; height: 28px; border-radius: 50%; background: #22c55e; cursor: pointer; box-shadow: 0 0 12px rgba(34,197,94,0.4); }
  input[type="range"]::-moz-range-thumb { width: 28px; height: 28px; border-radius: 50%; background: #22c55e; cursor: pointer; border: none; }
  .slider-labels { display: flex; justify-content: space-between; padding: 0 4px; }
  .slider-labels span { font-size: 10px; color: rgba(255,255,255,0.3); }
  
  /* Chips */
  .chip-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { display: flex; align-items: center; gap: 4px; padding: 8px 12px; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; background: rgba(255,255,255,0.02); color: rgba(255,255,255,0.6); cursor: pointer; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; }
  .chip.active { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); color: #22c55e; }
  .chip-label { font-size: 11px; }
  
  /* Inputs */
  .input { width: 100%; padding: 10px 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #fff; font-size: 14px; font-family: 'JetBrains Mono', monospace; outline: none; }
  .input:focus { border-color: rgba(255,255,255,0.15); }
  .textarea { width: 100%; padding: 10px 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #fff; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; resize: vertical; line-height: 1.6; outline: none; }
  .textarea:focus { border-color: rgba(255,255,255,0.15); }
  ::placeholder { color: rgba(255,255,255,0.2); }
  
  /* Toggle buttons */
  .toggle-row { display: flex; gap: 10px; }
  .toggle-col { flex: 1; }
  .toggle-btn { width: 40px; height: 40px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.02); font-size: 18px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
  .toggle-btn.active { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); }
  .toggle-labels { font-size: 9px; color: rgba(255,255,255,0.3); display: flex; gap: 12px; margin-top: 6px; }
  
  /* Meal row */
  .meal-row { display: flex; gap: 8px; }
  .meal-row .chip { flex: 1; justify-content: center; }
  
  /* Save button */
  .save-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #22c55e, #16a34a); border: none; border-radius: 14px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; letter-spacing: 1px; margin-top: 8px; transition: transform 0.1s, opacity 0.2s; }
  .save-btn:active { transform: scale(0.98); }
  .save-btn.secondary { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5); }
  
  /* Toast */
  .toast { padding: 12px 20px; background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); border-radius: 10px; color: #22c55e; font-size: 13px; font-weight: 600; text-align: center; animation: fadeIn 0.3s ease; margin-bottom: 12px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  
  /* Stat cards */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 14px 10px; text-align: center; }
  .stat-value { font-size: 22px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .stat-label { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 4px; letter-spacing: 0.5px; }
  
  /* Chart container */
  .chart-container svg { width: 100%; display: block; }
  .chart-legend { display: flex; align-items: center; gap: 12px; font-size: 9px; }
  .chart-legend-item { display: flex; align-items: center; gap: 4px; }
  .chart-legend-line { width: 12px; height: 2px; display: inline-block; border-radius: 1px; }
  .chart-legend-text { color: rgba(255,255,255,0.4); }
  
  /* Hourly bars */
  .hourly-chart { display: flex; gap: 2px; align-items: end; height: 100px; padding: 0 4px; }
  .hourly-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .hourly-bar { width: 100%; max-width: 20px; border-radius: 3px; transition: height 0.3s ease; }
  .hourly-label { font-size: 9px; color: rgba(255,255,255,0.3); }
  
  /* Correlation */
  .corr-section { margin-bottom: 16px; }
  .corr-title { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px; font-weight: 600; }
  .corr-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .corr-label { font-size: 12px; color: rgba(255,255,255,0.7); width: 60px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .corr-bar-bg { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
  .corr-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .corr-value { font-size: 11px; font-weight: 700; width: 28px; text-align: right; font-family: 'JetBrains Mono', monospace; }
  .corr-count { font-size: 9px; color: rgba(255,255,255,0.3); width: 20px; text-align: right; }
  
  /* Caffeine compare */
  .compare-row { display: flex; gap: 12px; }
  .compare-card { flex: 1; padding: 10px 12px; background: rgba(255,255,255,0.03); border-radius: 8px; text-align: center; }
  .compare-value { font-size: 20px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .compare-label { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  
  /* History */
  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .history-count { font-size: 12px; color: rgba(255,255,255,0.4); }
  .history-delete-all { font-size: 11px; color: #ef4444; background: none; border: none; cursor: pointer; opacity: 0.6; }
  .history-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 14px; margin-bottom: 8px; }
  .history-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .history-left { display: flex; align-items: center; gap: 10px; }
  .history-score-badge { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; color: #fff; font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
  .history-date { font-size: 12px; color: rgba(255,255,255,0.8); font-weight: 600; }
  .history-tags { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .tag { display: inline-flex; align-items: center; gap: 2px; padding: 2px 8px; background: rgba(255,255,255,0.05); border-radius: 6px; font-size: 10px; color: rgba(255,255,255,0.5); }
  .history-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .icon-btn { width: 28px; height: 28px; border-radius: 6px; border: none; background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.4); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .icon-btn.danger { color: #ef4444; }
  .history-memo { margin-top: 8px; padding: 8px 10px; background: rgba(255,255,255,0.03); border-radius: 6px; font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.5; }
  
  /* Empty state */
  .empty { text-align: center; padding: 40px 0; color: rgba(255,255,255,0.4); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }
  .empty-sub { font-size: 12px; margin-top: 4px; }
  
  /* Backup section */
  .backup-section { margin-top: 12px; }
  .backup-btn { width: 100%; padding: 14px; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; transition: all 0.15s; }
  .backup-btn:active { background: rgba(255,255,255,0.06); }
  .backup-btn.restore { border-color: rgba(129,140,248,0.3); color: rgba(129,140,248,0.8); }
  .backup-btn.danger { border-color: rgba(239,68,68,0.2); color: rgba(239,68,68,0.6); }
  .backup-info { font-size: 11px; color: rgba(255,255,255,0.25); text-align: center; margin-top: 12px; line-height: 1.6; }
  .backup-status { padding: 10px 16px; border-radius: 8px; font-size: 12px; text-align: center; margin-bottom: 8px; animation: fadeIn 0.3s ease; }
  .backup-status.success { background: rgba(34,197,94,0.1); color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
  .backup-status.error { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
  .backup-auto { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 8px; }
  .backup-auto-label { font-size: 12px; color: rgba(255,255,255,0.6); }
  .backup-auto-sub { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 2px; }
  .data-stats { padding: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 12px; }
  .data-stats-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
  .data-stats-key { color: rgba(255,255,255,0.4); }
  .data-stats-val { color: rgba(255,255,255,0.7); font-family: 'JetBrains Mono', monospace; font-weight: 600; }

  /* Hidden file input */
  #restoreInput { display: none; }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="header-icon">◉</span>
      <div>
        <div class="header-title">CONDITION</div>
        <div class="header-sub">컨디션 트래커</div>
      </div>
    </div>
    <div class="header-score" id="headerScore"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="checkin" onclick="switchTab('checkin')"><span style="font-size:14px">＋</span><span>체크인</span></button>
    <button class="tab" data-tab="dashboard" onclick="switchTab('dashboard')"><span style="font-size:14px">◈</span><span>대시보드</span></button>
    <button class="tab" data-tab="history" onclick="switchTab('history')"><span style="font-size:14px">☰</span><span>기록</span></button>
    <button class="tab" data-tab="settings" onclick="switchTab('settings')"><span style="font-size:14px">⚙</span><span>백업</span></button>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- CHECK-IN -->
    <div class="tab-panel active" id="panel-checkin">
      <div id="toast" style="display:none" class="toast">✓ 기록 완료!</div>

      <div class="card">
        <div class="card-label">컨디션 점수</div>
        <div class="score-display">
          <span class="score-big" id="scoreDisplay">5</span>
          <span class="score-max">/10</span>
        </div>
        <input type="range" id="scoreSlider" min="1" max="10" value="5" oninput="updateScore(this.value)">
        <div class="slider-labels"><span>최악</span><span>최상</span></div>
      </div>

      <div class="card">
        <div class="card-label">감정 상태</div>
        <div class="chip-grid" id="emotionChips"></div>
      </div>

      <div class="card">
        <div class="card-label">현재 활동</div>
        <div class="chip-grid" id="activityChips"></div>
      </div>

      <div class="toggle-row">
        <div class="card toggle-col">
          <div class="card-label">수면 (시간)</div>
          <input type="number" class="input" id="sleepInput" min="0" max="24" step="0.5" placeholder="예: 7">
        </div>
        <div class="card toggle-col">
          <div class="card-label">빠른 체크</div>
          <div style="display:flex;gap:8px">
            <button class="toggle-btn" id="caffeineBtn" onclick="toggleCaffeine()">☕</button>
            <button class="toggle-btn" id="exerciseBtn" onclick="toggleExercise()">🏃</button>
          </div>
          <div class="toggle-labels"><span>카페인</span><span>운동</span></div>
        </div>
      </div>

      <div class="card">
        <div class="card-label">식사 상태</div>
        <div class="meal-row" id="mealChips"></div>
      </div>

      <div class="card">
        <div class="card-label">메모 <span>(선택)</span></div>
        <textarea class="textarea" id="memoInput" rows="2" placeholder="지금 상태에 대해 자유롭게..."></textarea>
      </div>

      <button class="save-btn" id="saveBtn" onclick="saveEntry()">✓ 체크인 저장</button>
      <button class="save-btn secondary" id="cancelEditBtn" style="display:none;margin-top:8px" onclick="cancelEdit()">취소</button>
    </div>

    <!-- DASHBOARD -->
    <div class="tab-panel" id="panel-dashboard"></div>

    <!-- HISTORY -->
    <div class="tab-panel" id="panel-history"></div>

    <!-- SETTINGS / BACKUP -->
    <div class="tab-panel" id="panel-settings"></div>
  </div>
</div>

<input type="file" id="restoreInput" accept=".json" onchange="handleRestore(event)">

<script>
// ============ DATA ============
const STORAGE_KEY = 'condition-tracker-v2';
const BACKUP_TS_KEY = 'condition-tracker-last-backup';

const EMOTIONS = [
  { id: 'energized', label: '활력', emoji: '⚡' },
  { id: 'calm', label: '평온', emoji: '🌊' },
  { id: 'focused', label: '집중', emoji: '🎯' },
  { id: 'anxious', label: '불안', emoji: '😰' },
  { id: 'tired', label: '피로', emoji: '😮‍💨' },
  { id: 'frustrated', label: '짜증', emoji: '😤' },
  { id: 'happy', label: '기쁨', emoji: '😊' },
  { id: 'low', label: '우울', emoji: '😔' },
];
const ACTIVITIES = [
  { id: 'kwe', label: '꿰 작성', emoji: '📝' },
  { id: 'plae', label: '플에 작성', emoji: '✍️' },
  { id: 'lecture', label: '강의 시청', emoji: '🎧' },
  { id: 'writing', label: '글쓰기', emoji: '📖' },
  { id: 'research', label: '리서치', emoji: '🔍' },
  { id: 'rest', label: '휴식', emoji: '☕' },
  { id: 'exercise', label: '운동', emoji: '💪' },
  { id: 'other', label: '기타', emoji: '📌' },
];
const MEALS = [
  { id: 'empty', label: '공복', emoji: '🫗' },
  { id: 'light', label: '가볍게', emoji: '🥗' },
  { id: 'full', label: '식후', emoji: '🍚' },
];

// State
let data = { entries: [], version: 2 };
let state = { score: 5, emotion: '', activity: '', meal: '', caffeine: false, exercised: false, editingId: null };

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.entries)) {
        data = parsed;
      }
    }
  } catch (e) { console.error('Load failed:', e); }
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) { 
    console.error('Save failed:', e);
    alert('저장 실패! 브라우저 저장 공간을 확인하세요.');
  }
}

// ============ UTILS ============
function getScoreColor(s) {
  if (s <= 3) return '#ef4444';
  if (s <= 5) return '#f59e0b';
  if (s <= 7) return '#22c55e';
  return '#10b981';
}
function getScoreGradient(s) {
  if (s <= 3) return 'linear-gradient(135deg, #ef4444, #dc2626)';
  if (s <= 5) return 'linear-gradient(135deg, #f59e0b, #d97706)';
  if (s <= 7) return 'linear-gradient(135deg, #22c55e, #16a34a)';
  return 'linear-gradient(135deg, #10b981, #059669)';
}
function formatTime(ts) {
  const d = new Date(ts);
  const h = d.getHours(), m = String(d.getMinutes()).padStart(2,'0');
  return `${h < 12 ? '오전' : '오후'} ${h === 0 ? 12 : h > 12 ? h - 12 : h}:${m}`;
}
function formatDate(ts) { const d = new Date(ts); return `${d.getMonth()+1}/${d.getDate()}`; }
function formatFullDate(ts) {
  const d = new Date(ts);
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function avg(arr) { return arr.length > 0 ? arr.reduce((s,e) => s + e.score, 0) / arr.length : 0; }
function findItem(arr, id) { return arr.find(x => x.id === id); }

// ============ UI HELPERS ============
function switchTab(tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabId));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tabId));
  if (tabId === 'dashboard') renderDashboard();
  if (tabId === 'history') renderHistory();
  if (tabId === 'settings') renderSettings();
}

function updateScore(val) {
  state.score = parseInt(val);
  const el = document.getElementById('scoreDisplay');
  el.textContent = val;
  el.style.color = getScoreColor(state.score);
  el.style.textShadow = `0 0 40px ${getScoreColor(state.score)}33`;
}

function renderChips(containerId, items, stateKey) {
  const container = document.getElementById(containerId);
  container.innerHTML = items.map(item => `
    <button class="chip ${state[stateKey] === item.id ? 'active' : ''}" onclick="toggleChip('${stateKey}','${item.id}')">
      <span>${item.emoji}</span><span class="chip-label">${item.label}</span>
    </button>
  `).join('');
}

function toggleChip(key, id) {
  state[key] = state[key] === id ? '' : id;
  if (key === 'emotion') renderChips('emotionChips', EMOTIONS, 'emotion');
  if (key === 'activity') renderChips('activityChips', ACTIVITIES, 'activity');
  if (key === 'meal') renderChips('mealChips', MEALS, 'meal');
}

function toggleCaffeine() {
  state.caffeine = !state.caffeine;
  document.getElementById('caffeineBtn').classList.toggle('active', state.caffeine);
}
function toggleExercise() {
  state.exercised = !state.exercised;
  document.getElementById('exerciseBtn').classList.toggle('active', state.exercised);
}

function updateHeaderScore() {
  const el = document.getElementById('headerScore');
  const now = Date.now(), day = 86400000;
  const today = data.entries.filter(e => now - e.timestamp < day);
  const weekEntries = data.entries.filter(e => now - e.timestamp < day * 7);
  const val = today.length > 0 ? avg(today) : (weekEntries.length > 0 ? avg(weekEntries) : 0);
  if (val > 0) {
    el.innerHTML = `
      <div class="header-score-num" style="color:${getScoreColor(val)}">${val.toFixed(1)}</div>
      <div class="header-score-label">${today.length > 0 ? '오늘 '+today.length+'회' : '오늘 미기록'}</div>
    `;
  } else {
    el.innerHTML = '';
  }
}

// ============ SAVE ENTRY ============
function saveEntry() {
  const sleepVal = document.getElementById('sleepInput').value;
  const memoVal = document.getElementById('memoInput').value;

  const entry = {
    id: state.editingId || genId(),
    timestamp: state.editingId ? (data.entries.find(e => e.id === state.editingId)?.timestamp || Date.now()) : Date.now(),
    score: state.score,
    sleep: sleepVal ? parseFloat(sleepVal) : null,
    caffeine: state.caffeine,
    exercised: state.exercised,
    meal: state.meal || null,
    activity: state.activity || null,
    emotion: state.emotion || null,
    memo: memoVal || null,
  };

  if (state.editingId) {
    data.entries = data.entries.map(e => e.id === state.editingId ? entry : e);
    state.editingId = null;
    document.getElementById('saveBtn').textContent = '✓ 체크인 저장';
    document.getElementById('cancelEditBtn').style.display = 'none';
  } else {
    data.entries.push(entry);
  }

  saveData();
  resetForm();
  updateHeaderScore();

  const toast = document.getElementById('toast');
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 2000);
}

function resetForm() {
  state.score = 5; state.emotion = ''; state.activity = ''; state.meal = '';
  state.caffeine = false; state.exercised = false; state.editingId = null;
  document.getElementById('scoreSlider').value = 5;
  updateScore(5);
  document.getElementById('sleepInput').value = '';
  document.getElementById('memoInput').value = '';
  document.getElementById('caffeineBtn').classList.remove('active');
  document.getElementById('exerciseBtn').classList.remove('active');
  renderChips('emotionChips', EMOTIONS, 'emotion');
  renderChips('activityChips', ACTIVITIES, 'activity');
  renderChips('mealChips', MEALS, 'meal');
}

function cancelEdit() {
  resetForm();
  document.getElementById('saveBtn').textContent = '✓ 체크인 저장';
  document.getElementById('cancelEditBtn').style.display = 'none';
}

function startEdit(id) {
  const entry = data.entries.find(e => e.id === id);
  if (!entry) return;
  state.editingId = id;
  state.score = entry.score;
  state.emotion = entry.emotion || '';
  state.activity = entry.activity || '';
  state.meal = entry.meal || '';
  state.caffeine = entry.caffeine || false;
  state.exercised = entry.exercised || false;

  document.getElementById('scoreSlider').value = entry.score;
  updateScore(entry.score);
  document.getElementById('sleepInput').value = entry.sleep || '';
  document.getElementById('memoInput').value = entry.memo || '';
  document.getElementById('caffeineBtn').classList.toggle('active', state.caffeine);
  document.getElementById('exerciseBtn').classList.toggle('active', state.exercised);
  renderChips('emotionChips', EMOTIONS, 'emotion');
  renderChips('activityChips', ACTIVITIES, 'activity');
  renderChips('mealChips', MEALS, 'meal');

  document.getElementById('saveBtn').textContent = '✓ 수정 완료';
  document.getElementById('cancelEditBtn').style.display = 'block';
  switchTab('checkin');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function deleteEntry(id) {
  if (!confirm('이 기록을 삭제하시겠습니까?')) return;
  data.entries = data.entries.filter(e => e.id !== id);
  saveData();
  updateHeaderScore();
  renderHistory();
}

// ============ DASHBOARD ============
function renderDashboard() {
  const panel = document.getElementById('panel-dashboard');
  const entries = data.entries;

  if (entries.length === 0) {
    panel.innerHTML = '<div class="empty"><div class="empty-icon">◉</div><div class="empty-text">아직 기록이 없습니다</div><div class="empty-sub">체크인 탭에서 첫 기록을 남겨보세요</div></div>';
    return;
  }

  const now = Date.now(), day = 86400000;
  const today = entries.filter(e => now - e.timestamp < day);
  const week = entries.filter(e => now - e.timestamp < day * 7);
  const prev = entries.filter(e => now - e.timestamp >= day * 7 && now - e.timestamp < day * 14);
  const month = entries.filter(e => now - e.timestamp < day * 30);

  // Streak
  const daySet = new Set(entries.map(e => new Date(e.timestamp).toDateString()));
  let streak = 0;
  for (let i = 0; i < 365; i++) {
    if (daySet.has(new Date(now - i * day).toDateString())) streak++;
    else if (i > 0) break;
  }

  const trend = week.length > 0 && prev.length > 0 ? avg(week) - avg(prev) : null;
  const trendColor = trend === null ? 'rgba(255,255,255,0.3)' : trend >= 0 ? '#22c55e' : '#ef4444';
  const trendText = trend === null ? '—' : `${trend >= 0 ? '▲' : '▼'}${Math.abs(trend).toFixed(1)}`;

  let html = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-value">${avg(week).toFixed(1)}</div><div class="stat-label">7일 평균</div></div>
      <div class="stat-card"><div class="stat-value">${streak}</div><div class="stat-label">연속 기록일</div></div>
      <div class="stat-card"><div class="stat-value" style="color:${trendColor}">${trendText}</div><div class="stat-label">주간 변화</div></div>
    </div>
  `;

  // Trend chart
  html += `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="card-label" style="margin-bottom:0">전체 추이</div>
      <div class="chart-legend">
        <span class="chart-legend-item"><span class="chart-legend-line" style="background:linear-gradient(90deg,#f59e0b,#10b981)"></span><span class="chart-legend-text">실제</span></span>
        <span class="chart-legend-item"><span class="chart-legend-line" style="background:#818cf8;opacity:0.7"></span><span class="chart-legend-text">이동평균</span></span>
      </div>
    </div>
    <div class="chart-container">${renderTrendSVG(entries)}</div>
  </div>`;

  // Hourly
  html += `<div class="card"><div class="card-label">시간대별 패턴</div>${renderHourlyBars(entries)}</div>`;

  // Correlations
  html += `<div class="card"><div class="card-label" style="margin-bottom:16px">상관관계 분석</div>`;
  html += renderCorrelation(entries, 'emotion', '감정별 평균 컨디션', EMOTIONS);
  html += renderCorrelation(entries, 'activity', '활동별 평균 컨디션', ACTIVITIES);
  html += renderCorrelation(entries, 'meal', '식사 상태별', MEALS);

  // Caffeine
  if (entries.some(e => e.caffeine)) {
    const withC = entries.filter(e => e.caffeine), withoutC = entries.filter(e => !e.caffeine);
    const avgC = avg(withC), avgNC = avg(withoutC);
    html += `<div class="corr-section"><div class="corr-title">카페인 효과</div>
      <div class="compare-row">
        <div class="compare-card"><div class="compare-value" style="color:${getScoreColor(avgC)}">${avgC > 0 ? avgC.toFixed(1) : '—'}</div><div class="compare-label">☕ 카페인 O (${withC.length})</div></div>
        <div class="compare-card"><div class="compare-value" style="color:${getScoreColor(avgNC)}">${avgNC > 0 ? avgNC.toFixed(1) : '—'}</div><div class="compare-label">카페인 X (${withoutC.length})</div></div>
      </div></div>`;
  }
  html += '</div>';

  panel.innerHTML = html;
}

function renderTrendSVG(entries) {
  const sorted = [...entries].sort((a,b) => a.timestamp - b.timestamp).slice(-50);
  if (sorted.length < 2) return '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3);font-size:12px">2개 이상의 기록이 필요합니다</div>';

  const w = 100, h = 60, padX = 6, padTop = 4, padBot = 10;
  const cW = w - padX*2, cH = h - padTop - padBot;

  const pts = sorted.map((e,i) => ({
    x: padX + (i / (sorted.length-1)) * cW,
    y: padTop + cH - ((e.score-1)/9) * cH,
    score: e.score, ts: e.timestamp
  }));

  const movAvg = pts.map((p,i) => {
    const s = Math.max(0,i-2), end = Math.min(pts.length, i+3);
    const sl = pts.slice(s, end);
    const a = sl.reduce((sum,pt) => sum + pt.score, 0) / sl.length;
    return { x: p.x, y: padTop + cH - ((a-1)/9) * cH };
  });

  const line = pts.map((p,i) => `${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const area = `${line} L${pts[pts.length-1].x.toFixed(1)},${(padTop+cH).toFixed(1)} L${pts[0].x.toFixed(1)},${(padTop+cH).toFixed(1)} Z`;
  const avgLine = movAvg.map((p,i) => `${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');

  let gridLines = '';
  [1,3,5,7,10].forEach(v => {
    const y = padTop + cH - ((v-1)/9)*cH;
    gridLines += `<line x1="${padX}" y1="${y.toFixed(1)}" x2="${w-padX}" y2="${y.toFixed(1)}" stroke="rgba(255,255,255,0.06)" stroke-width="0.3"/>`;
    gridLines += `<text x="${padX-1}" y="${(y+1).toFixed(1)}" fill="rgba(255,255,255,0.25)" font-size="2.5" text-anchor="end">${v}</text>`;
  });

  const dots = pts.map(p => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="0.8" fill="${getScoreColor(p.score)}" opacity="0.9"/>`).join('');

  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="height:180px">
    <defs>
      <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/><stop offset="100%" stop-color="#22c55e" stop-opacity="0.02"/></linearGradient>
      <linearGradient id="lg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f59e0b"/><stop offset="50%" stop-color="#22c55e"/><stop offset="100%" stop-color="#10b981"/></linearGradient>
    </defs>
    ${gridLines}
    <path d="${area}" fill="url(#ag)"/>
    <path d="${line}" fill="none" stroke="url(#lg)" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.length >= 5 ? `<path d="${avgLine}" fill="none" stroke="#818cf8" stroke-width="0.6" stroke-dasharray="2,1" opacity="0.7"/>` : ''}
    ${dots}
    <text x="${pts[0].x.toFixed(1)}" y="${h-1}" fill="rgba(255,255,255,0.3)" font-size="2.5" text-anchor="start">${formatDate(pts[0].ts)}</text>
    <text x="${pts[pts.length-1].x.toFixed(1)}" y="${h-1}" fill="rgba(255,255,255,0.3)" font-size="2.5" text-anchor="end">${formatDate(pts[pts.length-1].ts)}</text>
  </svg>`;
}

function renderHourlyBars(entries) {
  const hours = Array.from({length:24}, () => ({total:0,count:0}));
  entries.forEach(e => { const h = new Date(e.timestamp).getHours(); hours[h].total += e.score; hours[h].count += 1; });

  const active = hours.filter(h => h.count > 0);
  if (active.length === 0) return '<p style="color:rgba(255,255,255,0.4);text-align:center;font-size:13px">데이터가 쌓이면 시간대별 패턴이 표시됩니다</p>';

  const maxCount = Math.max(...hours.map(h => h.count));
  let html = '<div class="hourly-chart">';
  for (let i = 6; i <= 26; i++) {
    const hour = i % 24, d = hours[hour];
    const barH = d.count > 0 ? Math.max(8, (d.avg = d.total/d.count, d.avg/10) * 80) : 4;
    const opacity = d.count > 0 ? 0.5 + (d.count/maxCount)*0.5 : 0.3;
    const bg = d.count > 0 ? getScoreGradient(d.total/d.count) : 'rgba(255,255,255,0.06)';
    html += `<div class="hourly-bar-col">
      <div class="hourly-bar" style="height:${barH}px;background:${bg};opacity:${opacity}"></div>
      ${hour % 3 === 0 ? `<span class="hourly-label">${hour}</span>` : ''}
    </div>`;
  }
  html += '</div>';
  return html;
}

function renderCorrelation(entries, field, title, lookupArr) {
  const map = {};
  entries.forEach(e => {
    const val = e[field]; if (!val) return;
    if (!map[val]) map[val] = {total:0,count:0};
    map[val].total += e.score; map[val].count += 1;
  });
  const groups = Object.entries(map).map(([k,v]) => ({key:k, avg:v.total/v.count, count:v.count})).sort((a,b) => b.avg - a.avg);
  if (groups.length === 0) return '';

  let html = `<div class="corr-section"><div class="corr-title">${title}</div>`;
  groups.slice(0,5).forEach(g => {
    const item = findItem(lookupArr, g.key);
    const label = item ? `${item.emoji} ${item.label}` : g.key;
    html += `<div class="corr-row">
      <span class="corr-label">${label}</span>
      <div class="corr-bar-bg"><div class="corr-bar-fill" style="width:${(g.avg/10)*100}%;background:${getScoreGradient(g.avg)}"></div></div>
      <span class="corr-value" style="color:${getScoreColor(g.avg)}">${g.avg.toFixed(1)}</span>
      <span class="corr-count">×${g.count}</span>
    </div>`;
  });
  html += '</div>';
  return html;
}

// ============ HISTORY ============
function renderHistory() {
  const panel = document.getElementById('panel-history');
  const entries = data.entries;

  if (entries.length === 0) {
    panel.innerHTML = '<div class="empty" style="font-size:14px">기록이 없습니다</div>';
    return;
  }

  let html = `<div class="history-header">
    <span class="history-count">총 ${entries.length}건</span>
    <button class="history-delete-all" onclick="deleteAll()">전체 삭제</button>
  </div>`;

  [...entries].sort((a,b) => b.timestamp - a.timestamp).forEach(entry => {
    const em = findItem(EMOTIONS, entry.emotion);
    const act = findItem(ACTIVITIES, entry.activity);
    const ml = findItem(MEALS, entry.meal);

    let tags = '';
    if (em) tags += `<span class="tag">${em.emoji} ${em.label}</span>`;
    if (act) tags += `<span class="tag">${act.emoji} ${act.label}</span>`;
    if (ml) tags += `<span class="tag">${ml.emoji} ${ml.label}</span>`;
    if (entry.caffeine) tags += '<span class="tag">☕</span>';
    if (entry.exercised) tags += '<span class="tag">🏃</span>';
    if (entry.sleep) tags += `<span class="tag">💤 ${entry.sleep}h</span>`;

    html += `<div class="history-card">
      <div class="history-top">
        <div class="history-left">
          <div class="history-score-badge" style="background:${getScoreGradient(entry.score)}">${entry.score}</div>
          <div>
            <div class="history-date">${formatFullDate(entry.timestamp)} ${formatTime(entry.timestamp)}</div>
            <div class="history-tags">${tags}</div>
          </div>
        </div>
        <div class="history-actions">
          <button class="icon-btn" onclick="startEdit('${entry.id}')">✎</button>
          <button class="icon-btn danger" onclick="deleteEntry('${entry.id}')">✕</button>
        </div>
      </div>
      ${entry.memo ? `<div class="history-memo">${entry.memo.replace(/</g,'&lt;')}</div>` : ''}
    </div>`;
  });

  panel.innerHTML = html;
}

function deleteAll() {
  if (!confirm('모든 기록을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;
  if (!confirm('정말 삭제하시겠습니까? 백업을 먼저 권장합니다.')) return;
  data.entries = [];
  saveData();
  updateHeaderScore();
  renderHistory();
}

function showBackupStatus(msg, type) {
  const el = document.getElementById('backupStatus');
  if (!el) return;
  el.innerHTML = `<div class="backup-status ${type}">${msg}</div>`;
  setTimeout(() => { if (el) el.innerHTML = ''; }, 4000);
}

function exportBackup() {
  try {
    const exportData = {
      ...data,
      exportedAt: Date.now(),
      exportVersion: 'condition-tracker-v2',
      deviceInfo: navigator.userAgent.slice(0, 100),
    };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const d = new Date();
    a.href = url;
    a.download = `condition-backup-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    localStorage.setItem(BACKUP_TS_KEY, String(Date.now()));
    showBackupStatus(`✓ 백업 완료 (${data.entries.length}건)`, 'success');
    renderSettings();
  } catch (e) {
    showBackupStatus('✕ 백업 실패: ' + e.message, 'error');
  }
}

function handleRestore(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.entries || !Array.isArray(imported.entries)) {
        throw new Error('유효하지 않은 백업 파일입니다');
      }

      // Validate entries
      imported.entries.forEach(entry => {
        if (!entry.id || !entry.timestamp || typeof entry.score !== 'number') {
          throw new Error('손상된 데이터가 포함되어 있습니다');
        }
      });

      // Merge: keep existing + add new (by id)
      const existingIds = new Set(data.entries.map(e => e.id));
      const newEntries = imported.entries.filter(e => !existingIds.has(e.id));
      const before = data.entries.length;
      data.entries = [...data.entries, ...newEntries];
      saveData();
      updateHeaderScore();

      showBackupStatus(`✓ 복원 완료! 기존 ${before}건 + 신규 ${newEntries.length}건 = 총 ${data.entries.length}건`, 'success');
      renderSettings();
    } catch (err) {
      showBackupStatus('✕ 복원 실패: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

async function copyToClipboard() {
  try {
    const exportData = { ...data, exportedAt: Date.now(), exportVersion: 'condition-tracker-v2' };
    await navigator.clipboard.writeText(JSON.stringify(exportData));
    showBackupStatus(`✓ 클립보드에 복사 완료 (${data.entries.length}건)`, 'success');
  } catch (e) {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = JSON.stringify({ ...data, exportedAt: Date.now(), exportVersion: 'condition-tracker-v2' });
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showBackupStatus(`✓ 클립보드에 복사 완료 (${data.entries.length}건)`, 'success');
  }
}

async function pasteFromClipboard() {
  try {
    let text;
    try {
      text = await navigator.clipboard.readText();
    } catch {
      text = prompt('백업 데이터를 붙여넣으세요:');
    }
    if (!text) return;

    const imported = JSON.parse(text);
    if (!imported.entries || !Array.isArray(imported.entries)) {
      throw new Error('유효하지 않은 데이터입니다');
    }

    const existingIds = new Set(data.entries.map(e => e.id));
    const newEntries = imported.entries.filter(e => !existingIds.has(e.id));
    const before = data.entries.length;
    data.entries = [...data.entries, ...newEntries];
    saveData();
    updateHeaderScore();

    showBackupStatus(`✓ 복원 완료! 기존 ${before}건 + 신규 ${newEntries.length}건 = 총 ${data.entries.length}건`, 'success');
    renderSettings();
  } catch (err) {
    showBackupStatus('✕ 복원 실패: ' + err.message, 'error');
  }
}

</script>
