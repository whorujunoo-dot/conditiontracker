<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CONDITION">
<meta name="theme-color" content="#0a0a0f">
<title>CONDITION TRACKER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Noto Sans KR',sans-serif;background:#0a0a0f;color:#fff;min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;padding-top:env(safe-area-inset-top,0px)}
.header{padding:20px 20px 16px;padding-top:max(20px,env(safe-area-inset-top,20px));display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.04)}
.header-left{display:flex;align-items:center;gap:10px}
.header-title{font-size:16px;font-weight:900;letter-spacing:3px;font-family:'JetBrains Mono',monospace}
.header-sub{font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px;letter-spacing:1px}
.header-score{text-align:right}
.header-score-num{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace}
.header-score-label{font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:1px}
.tabs{display:flex;padding:8px 16px;gap:4px;border-bottom:1px solid rgba(255,255,255,0.04);position:sticky;top:0;background:#0a0a0f;z-index:10}
.tab{flex:1;padding:10px 0;border:none;background:transparent;color:rgba(255,255,255,0.35);font-size:12px;font-weight:600;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;gap:6px;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s}
.tab.active{background:rgba(255,255,255,0.06);color:#fff}
.content{padding:16px;padding-bottom:40px}
.content>.tab-panel{display:none}
.content>.tab-panel.active{display:block}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:14px;padding:16px;margin-bottom:12px}
.card-label{font-size:12px;font-weight:700;color:rgba(255,255,255,0.6);margin-bottom:8px;letter-spacing:0.5px}
.card-label span{font-weight:400;color:rgba(255,255,255,0.3)}
.score-display{text-align:center;margin:12px 0 8px}
.score-big{font-size:56px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;transition:color 0.2s}
.score-max{font-size:16px;color:rgba(255,255,255,0.3);margin-left:4px}
input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:rgba(255,255,255,0.08);outline:none;margin:8px 0}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:28px;height:28px;border-radius:50%;background:#22c55e;cursor:pointer;box-shadow:0 0 12px rgba(34,197,94,0.4)}
input[type="range"]::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:#22c55e;cursor:pointer;border:none}
.slider-labels{display:flex;justify-content:space-between;padding:0 4px}
.slider-labels span{font-size:10px;color:rgba(255,255,255,0.3)}
.emotion-category{margin-bottom:10px}
.emotion-category:last-child{margin-bottom:0}
.emotion-cat-label{font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:6px;letter-spacing:0.5px}
.chip-grid{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:flex;align-items:center;gap:4px;padding:8px 12px;border:1px solid rgba(255,255,255,0.08);border-radius:20px;background:rgba(255,255,255,0.02);color:rgba(255,255,255,0.6);cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s}
.chip.active{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.4);color:#22c55e}
.chip-label{font-size:11px}
.input{width:100%;padding:10px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#fff;font-size:14px;font-family:'JetBrains Mono',monospace;outline:none}
.input:focus{border-color:rgba(255,255,255,0.15)}
.input-sm{padding:8px 10px;font-size:13px;text-align:center}
.textarea{width:100%;padding:10px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#fff;font-size:13px;font-family:'Noto Sans KR',sans-serif;resize:vertical;line-height:1.6;outline:none}
.textarea:focus{border-color:rgba(255,255,255,0.15)}
::placeholder{color:rgba(255,255,255,0.2)}
.sleep-row{display:flex;align-items:center;gap:8px}
.sleep-input-wrap{flex:1}
.sleep-input-label{font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:4px;text-align:center}
.sleep-arrow{color:rgba(255,255,255,0.2);font-size:16px;flex-shrink:0}
.sleep-result{text-align:center;margin-top:10px;padding:8px;background:rgba(255,255,255,0.03);border-radius:8px}
.sleep-result-num{font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace}
.sleep-result-label{font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px}
.quick-grid{display:flex;gap:8px;flex-wrap:wrap}
.quick-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 16px;border:1px solid rgba(255,255,255,0.08);border-radius:12px;background:rgba(255,255,255,0.02);cursor:pointer;transition:all 0.15s;min-width:72px}
.quick-btn.active{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.4)}
.quick-btn-emoji{font-size:20px}
.quick-btn-label{font-size:10px;color:rgba(255,255,255,0.4)}
.quick-btn.active .quick-btn-label{color:#22c55e}
.meal-row{display:flex;gap:8px}
.meal-row .chip{flex:1;justify-content:center}
.save-btn{width:100%;padding:16px;background:linear-gradient(135deg,#22c55e,#16a34a);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;letter-spacing:1px;margin-top:8px;transition:transform 0.1s}
.save-btn:active{transform:scale(0.98)}
.save-btn.secondary{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5)}
.toast{padding:12px 20px;background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);border-radius:10px;color:#22c55e;font-size:13px;font-weight:600;text-align:center;animation:fadeIn 0.3s ease;margin-bottom:12px}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:14px 10px;text-align:center}
.stat-value{font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace}
.stat-label{font-size:10px;color:rgba(255,255,255,0.35);margin-top:4px;letter-spacing:0.5px}
.chart-container svg{width:100%;display:block}
.chart-legend{display:flex;align-items:center;gap:12px;font-size:9px}
.chart-legend-item{display:flex;align-items:center;gap:4px}
.chart-legend-line{width:12px;height:2px;display:inline-block;border-radius:1px}
.chart-legend-text{color:rgba(255,255,255,0.4)}
.hourly-svg{width:100%;display:block}
.corr-section{margin-bottom:16px}
.corr-title{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:8px;font-weight:600}
.corr-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.corr-label{font-size:12px;color:rgba(255,255,255,0.7);width:60px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.corr-bar-bg{flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.corr-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.corr-value{font-size:11px;font-weight:700;width:28px;text-align:right;font-family:'JetBrains Mono',monospace}
.corr-count{font-size:9px;color:rgba(255,255,255,0.3);width:20px;text-align:right}
.compare-row{display:flex;gap:12px}
.compare-card{flex:1;padding:10px 12px;background:rgba(255,255,255,0.03);border-radius:8px;text-align:center}
.compare-value{font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace}
.compare-label{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px}
.history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.history-count{font-size:12px;color:rgba(255,255,255,0.4)}
.history-delete-all{font-size:11px;color:#ef4444;background:none;border:none;cursor:pointer;opacity:0.6}
.history-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:14px;margin-bottom:8px}
.history-top{display:flex;justify-content:space-between;align-items:flex-start}
.history-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.history-score-badge{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#fff;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.history-date{font-size:12px;color:rgba(255,255,255,0.8);font-weight:600}
.history-tags{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;gap:2px;padding:2px 8px;background:rgba(255,255,255,0.05);border-radius:6px;font-size:10px;color:rgba(255,255,255,0.5)}
.history-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{width:28px;height:28px;border-radius:6px;border:none;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.4);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.icon-btn.danger{color:#ef4444}
.history-memo{margin-top:8px;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:6px;font-size:12px;color:rgba(255,255,255,0.5);line-height:1.5}
.empty{text-align:center;padding:40px 0;color:rgba(255,255,255,0.4)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px}
.empty-sub{font-size:12px;margin-top:4px}
.backup-section{margin-top:12px}
.backup-btn{width:100%;padding:14px;border:1px solid rgba(255,255,255,0.08);border-radius:12px;background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.7);font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;transition:all 0.15s}
.backup-btn:active{background:rgba(255,255,255,0.06)}
.backup-btn.restore{border-color:rgba(129,140,248,0.3);color:rgba(129,140,248,0.8)}
.backup-btn.danger{border-color:rgba(239,68,68,0.2);color:rgba(239,68,68,0.6)}
.backup-info{font-size:11px;color:rgba(255,255,255,0.25);text-align:center;margin-top:12px;line-height:1.6}
.backup-status{padding:10px 16px;border-radius:8px;font-size:12px;text-align:center;margin-bottom:8px;animation:fadeIn 0.3s ease}
.backup-status.success{background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.2)}
.backup-status.error{background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.2)}
.data-stats{padding:16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:12px;margin-bottom:12px}
.data-stats-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px}
.data-stats-key{color:rgba(255,255,255,0.4)}
.data-stats-val{color:rgba(255,255,255,0.7);font-family:'JetBrains Mono',monospace;font-weight:600}
.insight-item{padding:14px;margin-bottom:12px;background:rgba(255,255,255,0.02);border-radius:10px}
.insight-item:last-child{margin-bottom:0}
.insight-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.insight-icon{font-size:16px}
.insight-title{font-size:13px;font-weight:700;color:rgba(255,255,255,0.85)}
.insight-text{font-size:12px;color:rgba(255,255,255,0.55);line-height:1.7;margin-bottom:8px}
.insight-tip{font-size:11px;color:rgba(129,140,248,0.8);line-height:1.5;padding:8px 10px;background:rgba(129,140,248,0.06);border-radius:6px;font-weight:500}
.custom-emotion-row{display:flex;gap:6px;margin-top:8px}
.custom-emotion-input{flex:1;padding:8px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;color:#fff;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none}
.custom-emotion-input:focus{border-color:rgba(255,255,255,0.15)}
.custom-emotion-add{padding:8px 14px;border:1px solid rgba(34,197,94,0.3);border-radius:20px;background:rgba(34,197,94,0.1);color:#22c55e;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap}
#restoreInput{display:none}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <span style="font-size:22px">◉</span>
      <div><div class="header-title">CONDITION</div><div class="header-sub">컨디션 트래커</div></div>
    </div>
    <div class="header-score" id="headerScore"></div>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="checkin" onclick="switchTab('checkin')"><span style="font-size:14px">＋</span><span>체크인</span></button>
    <button class="tab" data-tab="dashboard" onclick="switchTab('dashboard')"><span style="font-size:14px">◈</span><span>대시보드</span></button>
    <button class="tab" data-tab="history" onclick="switchTab('history')"><span style="font-size:14px">☰</span><span>기록</span></button>
    <button class="tab" data-tab="settings" onclick="switchTab('settings')"><span style="font-size:14px">⚙</span><span>백업</span></button>
  </div>
  <div class="content">
    <div class="tab-panel active" id="panel-checkin">
      <div id="toast" style="display:none" class="toast">✓ 기록 완료!</div>
      <div class="card">
        <div class="card-label">컨디션 점수</div>
        <div class="score-display"><span class="score-big" id="scoreDisplay">5</span><span class="score-max">/10</span></div>
        <input type="range" id="scoreSlider" min="1" max="10" value="5" oninput="updateScore(this.value)">
        <div class="slider-labels"><span>최악</span><span>최상</span></div>
      </div>
      <div class="card">
        <div class="card-label">감정 상태 <span>(복수 선택 가능)</span></div>
        <div id="emotionChips"></div>
        <div class="custom-emotion-row">
          <input type="text" class="custom-emotion-input" id="customEmotionInput" placeholder="직접 입력..." maxlength="10">
          <button class="custom-emotion-add" onclick="addCustomEmotion()">추가</button>
        </div>
      </div>
      <div class="card">
        <div class="card-label">현재 활동</div>
        <div class="chip-grid" id="activityChips"></div>
      </div>
      <div class="card">
        <div class="card-label">수면 기록</div>
        <div class="sleep-row">
          <div class="sleep-input-wrap"><div class="sleep-input-label">취침</div><input type="time" class="input input-sm" id="sleepTimeInput" onchange="calcSleep()"></div>
          <span class="sleep-arrow">→</span>
          <div class="sleep-input-wrap"><div class="sleep-input-label">기상</div><input type="time" class="input input-sm" id="wakeTimeInput" onchange="calcSleep()"></div>
        </div>
        <div class="sleep-result" id="sleepResult" style="display:none">
          <div class="sleep-result-num" id="sleepHoursDisplay">0</div>
          <div class="sleep-result-label">시간 수면</div>
        </div>
      </div>
      <div class="card">
        <div class="card-label">빠른 체크</div>
        <div class="quick-grid">
          <button class="quick-btn" id="caffeineBtn" onclick="toggleQuick('caffeine')"><span class="quick-btn-emoji">☕</span><span class="quick-btn-label">카페인</span></button>
          <button class="quick-btn" id="medicationBtn" onclick="toggleQuick('medication')"><span class="quick-btn-emoji">💊</span><span class="quick-btn-label">약/영양제</span></button>
        </div>
      </div>
      <div class="card">
        <div class="card-label">식사 상태</div>
        <div class="meal-row" id="mealChips"></div>
      </div>
      <div class="card">
        <div class="card-label">메모 <span>(선택)</span></div>
        <textarea class="textarea" id="memoInput" rows="2" placeholder="지금 상태에 대해 자유롭게..."></textarea>
      </div>
      <button class="save-btn" id="saveBtn" onclick="saveEntry()">✓ 체크인 저장</button>
      <button class="save-btn secondary" id="cancelEditBtn" style="display:none;margin-top:8px" onclick="cancelEdit()">취소</button>
    </div>
    <div class="tab-panel" id="panel-dashboard"></div>
    <div class="tab-panel" id="panel-history"></div>
    <div class="tab-panel" id="panel-settings"></div>
  </div>
</div>
<input type="file" id="restoreInput" accept=".json" onchange="handleRestore(event)">
<script>
const STORAGE_KEY='condition-tracker-v3',BACKUP_TS_KEY='condition-tracker-last-backup';
const EMOTION_CATEGORIES=[
  {label:'높은 에너지 · 긍정',emotions:[
    {id:'excited',label:'신남',emoji:'🤩'},{id:'energized',label:'활력',emoji:'⚡'},{id:'confident',label:'자신감',emoji:'💪'},{id:'focused',label:'집중',emoji:'🎯'},{id:'inspired',label:'영감',emoji:'✨'}]},
  {label:'낮은 에너지 · 긍정',emotions:[
    {id:'calm',label:'평온',emoji:'🌊'},{id:'relaxed',label:'편안',emoji:'😌'},{id:'content',label:'만족',emoji:'😊'},{id:'grateful',label:'감사',emoji:'🙏'}]},
  {label:'높은 에너지 · 부정',emotions:[
    {id:'anxious',label:'불안',emoji:'😰'},{id:'frustrated',label:'짜증',emoji:'😤'},{id:'stressed',label:'스트레스',emoji:'🤯'},{id:'angry',label:'화남',emoji:'😡'},{id:'overwhelmed',label:'압도됨',emoji:'😵'}]},
  {label:'낮은 에너지 · 부정',emotions:[
    {id:'tired',label:'피로',emoji:'😮‍💨'},{id:'bored',label:'지루함',emoji:'🥱'},{id:'low',label:'우울',emoji:'😔'},{id:'lonely',label:'외로움',emoji:'🥺'},{id:'numb',label:'무기력',emoji:'😶'}]},
];
const ALL_EMOTIONS=EMOTION_CATEGORIES.flatMap(c=>c.emotions);
const ACTIVITIES=[
  {id:'work',label:'업무',emoji:'💻'},{id:'outing',label:'외출',emoji:'🚶'},{id:'exercise',label:'운동',emoji:'🏋️'},
  {id:'rest',label:'휴식',emoji:'☕'},{id:'wakeup',label:'기상',emoji:'🌅'},{id:'family',label:'가족시간',emoji:'👨‍👩‍👧'},{id:'other',label:'기타',emoji:'📌'}];
const MEALS=[{id:'empty',label:'공복',emoji:'🫗'},{id:'light',label:'가볍게',emoji:'🥗'},{id:'full',label:'식후',emoji:'🍚'}];

let data={entries:[],version:3};
let S={score:5,emotions:[],activity:'',meal:'',caffeine:false,medication:false,sleepTime:'',wakeTime:'',sleepHours:null,editingId:null};

function loadData(){try{const r=localStorage.getItem(STORAGE_KEY);if(r){const p=JSON.parse(r);if(p&&Array.isArray(p.entries)){data=p;return;}}
const v2=localStorage.getItem('condition-tracker-v2');if(v2){const p=JSON.parse(v2);if(p&&Array.isArray(p.entries)){p.entries.forEach(e=>{if(e.emotion&&!e.emotions)e.emotions=[e.emotion];if(!e.emotions)e.emotions=[];if(e.medication===undefined)e.medication=false;});data={entries:p.entries,version:3};saveData();}}}catch(e){console.error(e);}}
function saveData(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch(e){alert('저장 실패!');}}

function gc(s){return s<=3?'#ef4444':s<=5?'#f59e0b':s<=7?'#22c55e':'#10b981';}
function gg(s){return s<=3?'linear-gradient(135deg,#ef4444,#dc2626)':s<=5?'linear-gradient(135deg,#f59e0b,#d97706)':s<=7?'linear-gradient(135deg,#22c55e,#16a34a)':'linear-gradient(135deg,#10b981,#059669)';}
function fmtTime(ts){const d=new Date(ts),h=d.getHours(),m=String(d.getMinutes()).padStart(2,'0');return `${h<12?'오전':'오후'} ${h===0?12:h>12?h-12:h}:${m}`;}
function fmtDate(ts){const d=new Date(ts);return `${d.getMonth()+1}/${d.getDate()}`;}
function fmtFull(ts){const d=new Date(ts),dn=['일','월','화','수','목','금','토'];return `${d.getMonth()+1}월 ${d.getDate()}일 (${dn[d.getDay()]})`;}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function avg(a){return a.length>0?a.reduce((s,e)=>s+e.score,0)/a.length:0;}
function fE(id){return ALL_EMOTIONS.find(e=>e.id===id)||{id,label:id,emoji:'🏷'};}
function fI(a,id){return a.find(x=>x.id===id);}

function switchTab(t){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+t));if(t==='dashboard')renderDash();if(t==='history')renderHist();if(t==='settings')renderSet();}

const ds=new Set(E.map(e=>new Date(e.timestamp).toDateString()));let stk=0;for(let i=0;i<365;i++){if(ds.has(new Date(now-i*D).toDateString()))stk++;else if(i>0)break;}

let h=`<div class="stat-grid"><div class="stat-card"><div class="stat-value">${avg(wk).toFixed(1)}</div><div class="stat-label">7일 평균</div></div><div class="stat-card"><div class="stat-value">${stk}</div><div class="stat-label">연속 기록일</div></div><div class="stat-card"><div class="stat-value" style="color:${tC}">${tT}</div><div class="stat-label">주간 변화</div></div></div>`;

h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="card-label" style="margin-bottom:0">전체 추이</div><div class="chart-legend"><span class="chart-legend-item"><span class="chart-legend-line" style="background:linear-gradient(90deg,#f59e0b,#10b981)"></span><span class="chart-legend-text">실제</span></span><span class="chart-legend-item"><span class="chart-legend-line" style="background:#818cf8;opacity:0.7"></span><span class="chart-legend-text">이동평균</span></span></div></div><div class="chart-container">${trendSVG(E)}</div></div>`;
h+=`<div class="card"><div class="card-label">시간대별 패턴</div>${hourlyBars(E)}</div>`;
h+=`<div class="card"><div class="card-label" style="margin-bottom:16px">상관관계 분석</div>${emCorr(E)}${corr(E,'activity','활동별 평균 컨디션',ACTIVITIES)}${corr(E,'meal','식사 상태별',MEALS)}${memoCorr(E)}`;

if(E.some(e=>e.caffeine)){const w=E.filter(e=>e.caffeine),wo=E.filter(e=>!e.caffeine);h+=`<div class="corr-section"><div class="corr-title">카페인 효과</div><div class="compare-row"><div class="compare-card"><div class="compare-value" style="color:${gc(avg(w))}">${avg(w).toFixed(1)}</div><div class="compare-label">☕ O (${w.length})</div></div><div class="compare-card"><div class="compare-value" style="color:${gc(avg(wo))}">${avg(wo).toFixed(1)}</div><div class="compare-label">☕ X (${wo.length})</div></div></div></div>`;}
if(E.some(e=>e.medication)){const w=E.filter(e=>e.medication),wo=E.filter(e=>!e.medication);h+=`<div class="corr-section"><div class="corr-title">약/영양제 효과</div><div class="compare-row"><div class="compare-card"><div class="compare-value" style="color:${gc(avg(w))}">${avg(w).toFixed(1)}</div><div class="compare-label">💊 O (${w.length})</div></div><div class="compare-card"><div class="compare-value" style="color:${gc(avg(wo))}">${avg(wo).toFixed(1)}</div><div class="compare-label">💊 X (${wo.length})</div></div></div></div>`;}
h+='</div>';h+=insights(E);P.innerHTML=h;}

function trendSVG(E){const sr=[...E].sort((a,b)=>a.timestamp-b.timestamp).slice(-50);if(sr.length<2)return '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.3);font-size:12px">2개 이상 필요</div>';
const w=100,ht=60,px=6,pt=4,pb=10,cW=w-px*2,cH=ht-pt-pb;const ps=sr.map((e,i)=>({x:px+(i/(sr.length-1))*cW,y:pt+cH-((e.score-1)/9)*cH,s:e.score,t:e.timestamp}));
const ma=ps.map((p,i)=>{const s=Math.max(0,i-2),end=Math.min(ps.length,i+3),sl=ps.slice(s,end);return{x:p.x,y:pt+cH-((sl.reduce((a,b)=>a+b.s,0)/sl.length-1)/9)*cH};});
const ln=ps.map((p,i)=>`${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');const ar=`${ln} L${ps[ps.length-1].x.toFixed(1)},${(pt+cH).toFixed(1)} L${ps[0].x.toFixed(1)},${(pt+cH).toFixed(1)} Z`;const al=ma.map((p,i)=>`${i?'L':'M'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
let g='';[1,3,5,7,10].forEach(v=>{const y=pt+cH-((v-1)/9)*cH;g+=`<line x1="${px}" y1="${y.toFixed(1)}" x2="${w-px}" y2="${y.toFixed(1)}" stroke="rgba(255,255,255,0.06)" stroke-width="0.3"/><text x="${px-1}" y="${(y+1).toFixed(1)}" fill="rgba(255,255,255,0.25)" font-size="2.5" text-anchor="end">${v}</text>`;});
const dt=ps.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="0.8" fill="${gc(p.s)}" opacity="0.9"/>`).join('');
return `<svg viewBox="0 0 ${w} ${ht}" preserveAspectRatio="none" style="height:180px"><defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#22c55e" stop-opacity="0.3"/><stop offset="100%" stop-color="#22c55e" stop-opacity="0.02"/></linearGradient><linearGradient id="lg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f59e0b"/><stop offset="50%" stop-color="#22c55e"/><stop offset="100%" stop-color="#10b981"/></linearGradient></defs>${g}<path d="${ar}" fill="url(#ag)"/><path d="${ln}" fill="none" stroke="url(#lg)" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>${ps.length>=5?`<path d="${al}" fill="none" stroke="#818cf8" stroke-width="0.6" stroke-dasharray="2,1" opacity="0.7"/>`:''} ${dt}<text x="${ps[0].x.toFixed(1)}" y="${ht-1}" fill="rgba(255,255,255,0.3)" font-size="2.5" text-anchor="start">${fmtDate(ps[0].t)}</text><text x="${ps[ps.length-1].x.toFixed(1)}" y="${ht-1}" fill="rgba(255,255,255,0.3)" font-size="2.5" text-anchor="end">${fmtDate(ps[ps.length-1].t)}</text></svg>`;}

function hourlyBars(E){const hrs=Array.from({length:24},()=>({t:0,c:0}));E.forEach(e=>{const h=new Date(e.timestamp).getHours();hrs[h].t+=e.score;hrs[h].c+=1;});
if(!hrs.some(h=>h.c>0))return '<p style="color:rgba(255,255,255,0.4);text-align:center;font-size:13px">데이터가 쌓이면 표시됩니다</p>';
const bks=[];for(let i=0;i<12;i++){const h1=(6+i*2)%24,h2=(7+i*2)%24;bks.push({l:h1,a:(hrs[h1].c+hrs[h2].c)>0?(hrs[h1].t+hrs[h2].t)/(hrs[h1].c+hrs[h2].c):0,c:hrs[h1].c+hrs[h2].c});}
const W=320,H=150,pL=28,pR=10,pT=24,pB=24,cW=W-pL-pR,cH=H-pT-pB,bW=Math.floor(cW/12)-6,gap=(cW-bW*12)/11+bW;
let bars='',labs='',gl='';
[2,4,6,8,10].forEach(v=>{const y=pT+cH-(v/10)*cH;gl+=`<line x1="${pL}" y1="${y}" x2="${W-pR}" y2="${y}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;if(v%4===0||v===10)gl+=`<text x="${pL-6}" y="${y+4}" fill="rgba(255,255,255,0.2)" font-size="10" text-anchor="end" font-family="JetBrains Mono,monospace">${v}</text>`;});
bks.forEach((b,i)=>{const x=pL+i*gap,bH=b.c>0?Math.max(4,(b.a/10)*cH):2,y=pT+cH-bH;bars+=`<rect x="${x}" y="${y}" width="${bW}" height="${bH}" rx="3" fill="${b.c>0?gc(b.a):'rgba(255,255,255,0.06)'}" opacity="${b.c>0?0.85:0.2}"/>`;if(b.c>0)bars+=`<text x="${x+bW/2}" y="${y-6}" fill="${gc(b.a)}" font-size="11" font-weight="700" text-anchor="middle" font-family="JetBrains Mono,monospace">${b.a.toFixed(1)}</text>`;labs+=`<text x="${x+bW/2}" y="${H-4}" fill="rgba(255,255,255,0.35)" font-size="10" text-anchor="middle" font-family="JetBrains Mono,monospace">${b.l}시</text>`;});
return `<svg viewBox="0 0 ${W} ${H}" class="hourly-svg" style="height:160px" preserveAspectRatio="xMidYMid meet">${gl}${bars}${labs}</svg>`;}

// Korean stopwords + memo keyword extraction
const STOPWORDS=new Set(['은','는','이','가','을','를','의','에','에서','도','로','으로','와','과','하고','한','할','하는','했','합니다','있','없','것','수','등','더','좀','잘','안','못','너무','아주','매우','정말','진짜','그','이','저','때','중','후','전','오늘','내일','어제','지금','아침','점심','저녁','밤','그냥','같은','하다','되다','있다','없다','나','내','제','좀','다','또','및','대','때문','위해','통해','대한','이번','그리고','하지만','그래서','그런데','그래도','근데','아','네','응','음','뭔가','약간','되게','엄청']);

function extractKeywords(memo){
  if(!memo)return [];
  // Remove special chars, split by whitespace
  const tokens=memo.replace(/[^\uAC00-\uD7A3\u3131-\u3163a-zA-Z0-9\s]/g,' ').split(/\s+/).filter(t=>t.length>=2&&!STOPWORDS.has(t));
  return [...new Set(tokens)]; // dedupe within single memo
}

function memoCorr(E){
  const withMemo=E.filter(e=>e.memo&&e.memo.trim().length>0);
  if(withMemo.length<3)return '';

  // Count keyword occurrences and their score totals
  const kwMap={};
  withMemo.forEach(e=>{
    extractKeywords(e.memo).forEach(kw=>{
      if(!kwMap[kw])kwMap[kw]={t:0,c:0,scores:[]};
      kwMap[kw].t+=e.score;kwMap[kw].c+=1;kwMap[kw].scores.push(e.score);
    });
  });

  // Filter: keyword must appear 2+ times
  const kws=Object.entries(kwMap).filter(([k,v])=>v.c>=2).map(([k,v])=>({kw:k,a:v.t/v.c,c:v.c}));
  if(kws.length===0)return '';

  // Sort: best keywords first
  const sorted=[...kws].sort((a,b)=>b.a-a.a);
  // Also get worst
  const worst=[...kws].sort((a,b)=>a.a-b.a);

  let h='<div class="corr-section"><div class="corr-title">📝 메모 키워드 분석</div>';
  h+='<div style="font-size:10px;color:rgba(255,255,255,0.25);margin-bottom:8px">2회 이상 언급된 키워드와 컨디션 상관관계</div>';

  // Show top positive (green section)
  if(sorted.length>0){
    h+='<div style="font-size:10px;color:rgba(34,197,94,0.6);margin:8px 0 4px;font-weight:600">▲ 높은 컨디션과 함께 등장</div>';
    sorted.slice(0,5).forEach(x=>{
      h+=`<div class="corr-row"><span class="corr-label" style="width:70px">"${x.kw}"</span><div class="corr-bar-bg"><div class="corr-bar-fill" style="width:${(x.a/10)*100}%;background:${gg(x.a)}"></div></div><span class="corr-value" style="color:${gc(x.a)}">${x.a.toFixed(1)}</span><span class="corr-count">×${x.c}</span></div>`;
    });
  }

  // Show top negative (red section) if different from positive
  const negatives=worst.filter(w=>!sorted.slice(0,5).find(s=>s.kw===w.kw));
  if(negatives.length>0&&negatives[0].a<6){
    h+='<div style="font-size:10px;color:rgba(239,68,68,0.6);margin:12px 0 4px;font-weight:600">▼ 낮은 컨디션과 함께 등장</div>';
    negatives.slice(0,3).forEach(x=>{
      h+=`<div class="corr-row"><span class="corr-label" style="width:70px">"${x.kw}"</span><div class="corr-bar-bg"><div class="corr-bar-fill" style="width:${(x.a/10)*100}%;background:${gg(x.a)}"></div></div><span class="corr-value" style="color:${gc(x.a)}">${x.a.toFixed(1)}</span><span class="corr-count">×${x.c}</span></div>`;
    });
  }
  h+='</div>';
  return h;
}

function emCorr(E){const m={};E.forEach(e=>{const ems=Array.isArray(e.emotions)?e.emotions:e.emotion?[e.emotion]:[];ems.forEach(id=>{if(!m[id])m[id]={t:0,c:0};m[id].t+=e.score;m[id].c+=1;});});
const g=Object.entries(m).map(([k,v])=>({k,a:v.t/v.c,c:v.c})).sort((a,b)=>b.a-a.a);if(g.length===0)return '';
let h='<div class="corr-section"><div class="corr-title">감정별 평균 컨디션</div>';g.slice(0,8).forEach(x=>{const em=fE(x.k);h+=`<div class="corr-row"><span class="corr-label">${em.emoji} ${em.label}</span><div class="corr-bar-bg"><div class="corr-bar-fill" style="width:${(x.a/10)*100}%;background:${gg(x.a)}"></div></div><span class="corr-value" style="color:${gc(x.a)}">${x.a.toFixed(1)}</span><span class="corr-count">×${x.c}</span></div>`;});return h+'</div>';}

function corr(E,f,title,arr){const m={};E.forEach(e=>{const v=e[f];if(!v)return;if(!m[v])m[v]={t:0,c:0};m[v].t+=e.score;m[v].c+=1;});
const g=Object.entries(m).map(([k,v])=>({k,a:v.t/v.c,c:v.c})).sort((a,b)=>b.a-a.a);if(g.length===0)return '';
let h=`<div class="corr-section"><div class="corr-title">${title}</div>`;g.slice(0,5).forEach(x=>{const it=fI(arr,x.k),lb=it?`${it.emoji} ${it.label}`:x.k;h+=`<div class="corr-row"><span class="corr-label">${lb}</span><div class="corr-bar-bg"><div class="corr-bar-fill" style="width:${(x.a/10)*100}%;background:${gg(x.a)}"></div></div><span class="corr-value" style="color:${gc(x.a)}">${x.a.toFixed(1)}</span><span class="corr-count">×${x.c}</span></div>`;});return h+'</div>';}

function insights(E){if(E.length<3)return `<div class="card"><div class="card-label">💡 인사이트</div><div style="color:rgba(255,255,255,0.4);font-size:13px;text-align:center;padding:20px 0">기록 3건 이상 필요 (현재 ${E.length}건)</div></div>`;
const now=Date.now(),D=864e5,ins=[];
const hrs=Array.from({length:24},()=>({t:0,c:0}));E.forEach(e=>{const h=new Date(e.timestamp).getHours();hrs[h].t+=e.score;hrs[h].c+=1;});const hA=hrs.map((h,i)=>({h:i,a:h.c>=2?h.t/h.c:0,c:h.c})).filter(h=>h.a>0);
if(hA.length>0){const b=hA.reduce((a,b)=>a.a>b.a?a:b),w=hA.reduce((a,b)=>a.a<b.a?a:b);if(b.h!==w.h){const p=b.h<12?'오전':b.h<18?'오후':'저녁';ins.push({i:'⏰',t:'골든 타임',x:`${p} ${b.h}시대 컨디션 최고 (${b.a.toFixed(1)}점). ${w.h}시대 최저 (${w.a.toFixed(1)}점).`,tip:`핵심 작업은 ${p} ${b.h}시 근처에 배치하세요.`,c:'#22c55e'});}}
const eM={};E.forEach(e=>{(Array.isArray(e.emotions)?e.emotions:e.emotion?[e.emotion]:[]).forEach(id=>{if(!eM[id])eM[id]={t:0,c:0};eM[id].t+=e.score;eM[id].c+=1;});});const eR=Object.entries(eM).map(([k,v])=>({id:k,a:v.t/v.c})).sort((a,b)=>b.a-a.a);
if(eR.length>=2){const b=fE(eR[0].id),w=fE(eR[eR.length-1].id);ins.push({i:b.emoji,t:'감정-퍼포먼스 연결',x:`'${b.label}' 상태 → ${eR[0].a.toFixed(1)}점 최고. '${w.label}' 상태 → ${eR[eR.length-1].a.toFixed(1)}점 최저.`,tip:`'${b.label}' 상태를 유도하는 루틴을 작업 전에 만들어보세요.`,c:'#818cf8'});}
const aM={};E.forEach(e=>{if(!e.activity)return;if(!aM[e.activity])aM[e.activity]={t:0,c:0};aM[e.activity].t+=e.score;aM[e.activity].c+=1;});const aR=Object.entries(aM).map(([k,v])=>({id:k,a:v.t/v.c})).sort((a,b)=>b.a-a.a);
if(aR.length>=2){const b=fI(ACTIVITIES,aR[0].id),w=fI(ACTIVITIES,aR[aR.length-1].id);if(b&&w)ins.push({i:'📊',t:'활동별 에너지',x:`'${b.label}' → ${aR[0].a.toFixed(1)}점 최고. '${w.label}' → ${aR[aR.length-1].a.toFixed(1)}점 최저.`,tip:`'${w.label}'은 컨디션 좋은 시간대에, '${b.label}'은 에너지 낮을 때도 OK.`,c:'#f59e0b'});}
const wS=E.filter(e=>e.sleep!=null);if(wS.length>=3){const gd=wS.filter(e=>e.sleep>=7),bd=wS.filter(e=>e.sleep<6);if(gd.length>0&&bd.length>0){const d=avg(gd)-avg(bd);if(Math.abs(d)>0.3)ins.push({i:'💤',t:'수면 영향도',x:`7h+ 수면 → ${avg(gd).toFixed(1)}점. 6h 미만 → ${avg(bd).toFixed(1)}점. 차이 ${d>0?'+':''}${d.toFixed(1)}점.`,tip:d>0?'수면이 컨디션에 큰 영향. 7시간 이상 목표.':'수면 질이 더 중요할 수 있어요.',c:'#a78bfa'});}}
const wC=E.filter(e=>e.caffeine),woC=E.filter(e=>!e.caffeine);if(wC.length>=2&&woC.length>=2){const d=avg(wC)-avg(woC);if(Math.abs(d)>0.3)ins.push({i:'☕',t:'카페인 효과',x:`섭취 시 ${avg(wC).toFixed(1)}점, 미섭취 ${avg(woC).toFixed(1)}점 (${d>0?'+':''}${d.toFixed(1)}).`,tip:d>0?'카페인이 도움! 골든 타임 전 섭취 추천.':'카페인이 오히려 부정적. 줄여보는 실험 추천.',c:'#f97316'});}
const wM=E.filter(e=>e.medication),woM=E.filter(e=>!e.medication);if(wM.length>=2&&woM.length>=2){const d=avg(wM)-avg(woM);if(Math.abs(d)>0.3)ins.push({i:'💊',t:'약/영양제 효과',x:`복용 시 ${avg(wM).toFixed(1)}점, 미복용 ${avg(woM).toFixed(1)}점 (${d>0?'+':''}${d.toFixed(1)}).`,tip:d>0?'긍정적 효과. 꾸준히 유지하세요.':'부정적 상관. 전문가 상담 고려.',c:'#ec4899'});}
const sr=[...E].sort((a,b)=>a.timestamp-b.timestamp);if(sr.length>=5){const f=sr.slice(0,Math.floor(sr.length/2)),s=sr.slice(Math.floor(sr.length/2));const d=avg(s)-avg(f);if(Math.abs(d)>0.2)ins.push({i:d>0?'📈':'📉',t:'전체 추세',x:`전반부 ${avg(f).toFixed(1)}점 → 후반부 ${avg(s).toFixed(1)}점. ${d>0?'상승':'하락'} 추세.`,tip:d>0?'좋은 흐름! 루틴 유지.':'하락 추세. 수면/운동/휴식 점검.',c:d>0?'#22c55e':'#ef4444'});}
// 9. Memo keyword insight
const memoEntries=E.filter(e=>e.memo&&e.memo.trim());if(memoEntries.length>=3){const kwM={};memoEntries.forEach(e=>{extractKeywords(e.memo).forEach(kw=>{if(!kwM[kw])kwM[kw]={t:0,c:0};kwM[kw].t+=e.score;kwM[kw].c+=1;});});
const kwR=Object.entries(kwM).filter(([k,v])=>v.c>=2).map(([k,v])=>({kw:k,a:v.t/v.c,c:v.c}));
if(kwR.length>=2){const best=kwR.sort((a,b)=>b.a-a.a)[0],worst=kwR.sort((a,b)=>a.a-b.a)[0];
if(best.kw!==worst.kw&&(best.a-worst.a)>1)ins.push({i:'📝',t:'메모 키워드 패턴',x:`"${best.kw}" 언급 시 평균 ${best.a.toFixed(1)}점, "${worst.kw}" 언급 시 ${worst.a.toFixed(1)}점. 메모 속 단어가 컨디션 상태를 반영합니다.`,tip:`"${worst.kw}" 관련 상황을 줄이거나 대처법을 마련해보세요. "${best.kw}" 상황을 의도적으로 늘려보세요.`,c:'#8b5cf6'});}}
// 10. Day of week
const dM=Array.from({length:7},()=>({t:0,c:0}));E.forEach(e=>{const d=new Date(e.timestamp).getDay();dM[d].t+=e.score;dM[d].c+=1;});const dn=['일','월','화','수','목','금','토'],dA=dM.map((d,i)=>({d:dn[i],a:d.c>=1?d.t/d.c:0})).filter(d=>d.a>0);
if(dA.length>=3){const b=dA.reduce((a,b)=>a.a>b.a?a:b),w=dA.reduce((a,b)=>a.a<b.a?a:b);if(b.d!==w.d)ins.push({i:'📅',t:'요일 패턴',x:`${b.d}요일 최고 (${b.a.toFixed(1)}점), ${w.d}요일 최저 (${w.a.toFixed(1)}점).`,tip:`${w.d}요일엔 가벼운 작업 위주로.`,c:'#06b6d4'});}
if(ins.length===0)return '<div class="card"><div class="card-label">💡 인사이트</div><div style="color:rgba(255,255,255,0.4);font-size:13px;text-align:center;padding:20px 0">더 다양한 데이터가 필요합니다</div></div>';
let h=`<div class="card"><div class="card-label" style="margin-bottom:16px">💡 인사이트 · ${ins.length}건</div>`;ins.forEach(n=>{h+=`<div class="insight-item" style="border-left:3px solid ${n.c}"><div class="insight-header"><span class="insight-icon">${n.i}</span><span class="insight-title">${n.t}</span></div><div class="insight-text">${n.x}</div><div class="insight-tip">→ ${n.tip}</div></div>`;});return h+'</div>';}

function renderHist(){const P=document.getElementById('panel-history'),E=data.entries;if(E.length===0){P.innerHTML='<div class="empty" style="font-size:14px">기록이 없습니다</div>';return;}
let h=`<div class="history-header"><span class="history-count">총 ${E.length}건</span><button class="history-delete-all" onclick="delAll()">전체 삭제</button></div>`;
[...E].sort((a,b)=>b.timestamp-a.timestamp).forEach(e=>{const ems=Array.isArray(e.emotions)?e.emotions:e.emotion?[e.emotion]:[];const act=fI(ACTIVITIES,e.activity),ml=fI(MEALS,e.meal);
let tg='';ems.forEach(id=>{const em=fE(id);tg+=`<span class="tag">${em.emoji} ${em.label}</span>`;});
if(act)tg+=`<span class="tag">${act.emoji} ${act.label}</span>`;if(ml)tg+=`<span class="tag">${ml.emoji} ${ml.label}</span>`;if(e.caffeine)tg+='<span class="tag">☕</span>';if(e.medication)tg+='<span class="tag">💊</span>';if(e.sleep)tg+=`<span class="tag">💤 ${e.sleep}h</span>`;
h+=`<div class="history-card"><div class="history-top"><div class="history-left"><div class="history-score-badge" style="background:${gg(e.score)}">${e.score}</div><div style="min-width:0"><div class="history-date">${fmtFull(e.timestamp)} ${fmtTime(e.timestamp)}</div><div class="history-tags">${tg}</div></div></div><div class="history-actions"><button class="icon-btn" onclick="startEdit('${e.id}')">✎</button><button class="icon-btn danger" onclick="deleteEntry('${e.id}')">✕</button></div></div>${e.memo?`<div class="history-memo">${e.memo.replace(/</g,'&lt;')}</div>`:''}</div>`;});
P.innerHTML=h;}

function delAll(){if(!confirm('모든 기록 삭제?'))return;if(!confirm('정말? 백업 먼저 권장.'))return;data.entries=[];saveData();updateHeader();renderHist();}

function renderSet(){const P=document.getElementById('panel-settings'),E=data.entries,lb=localStorage.getItem(BACKUP_TS_KEY),sz=new Blob([JSON.stringify(data)]).size,ss=sz<1024?sz+' B':(sz/1024).toFixed(1)+' KB';
let fd='—',ld='—';if(E.length>0){const s=[...E].sort((a,b)=>a.timestamp-b.timestamp);fd=fmtFull(s[0].timestamp);ld=fmtFull(s[s.length-1].timestamp);}
P.innerHTML=`<div class="data-stats"><div class="data-stats-row"><span class="data-stats-key">총 기록 수</span><span class="data-stats-val">${E.length}건</span></div><div class="data-stats-row"><span class="data-stats-key">첫 기록</span><span class="data-stats-val">${fd}</span></div><div class="data-stats-row"><span class="data-stats-key">마지막 기록</span><span class="data-stats-val">${ld}</span></div><div class="data-stats-row"><span class="data-stats-key">데이터 크기</span><span class="data-stats-val">${ss}</span></div><div class="data-stats-row"><span class="data-stats-key">마지막 백업</span><span class="data-stats-val">${lb?fmtFull(parseInt(lb)):'없음'}</span></div></div><div id="backupStatus"></div><div class="backup-section"><button class="backup-btn" onclick="expBackup()"><span>📦</span> JSON 백업 다운로드</button><button class="backup-btn restore" onclick="document.getElementById('restoreInput').click()"><span>📂</span> 백업 파일에서 복원</button><button class="backup-btn" onclick="copyClip()"><span>📋</span> 클립보드에 복사</button><button class="backup-btn restore" onclick="pasteClip()"><span>📥</span> 클립보드에서 붙여넣기</button><button class="backup-btn danger" onclick="delAll()"><span>🗑</span> 전체 데이터 삭제</button></div><div class="backup-info">데이터는 브라우저에 저장됩니다.<br>브라우저 데이터 삭제 시 기록이 사라질 수 있으니<br><strong>주기적으로 백업해주세요.</strong><br><br>💡 복원 시 기존 데이터와 병합 (중복 제거)</div>`;}

function bkMsg(m,t){const el=document.getElementById('backupStatus');if(!el)return;el.innerHTML=`<div class="backup-status ${t}">${m}</div>`;setTimeout(()=>{if(el)el.innerHTML='';},4000);}

function expBackup(){try{const e={...data,exportedAt:Date.now(),exportVersion:'v3'};const b=new Blob([JSON.stringify(e,null,2)],{type:'application/json'});const u=URL.createObjectURL(b),a=document.createElement('a'),d=new Date();a.href=u;a.download=`condition-backup-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);localStorage.setItem(BACKUP_TS_KEY,String(Date.now()));bkMsg(`✓ 백업 완료 (${data.entries.length}건)`,'success');renderSet();}catch(e){bkMsg('✕ 실패: '+e.message,'error');}}

function handleRestore(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(e){try{const im=JSON.parse(e.target.result);if(!im.entries||!Array.isArray(im.entries))throw new Error('유효하지 않음');im.entries.forEach(x=>{if(!x.id||!x.timestamp||typeof x.score!=='number')throw new Error('손상된 데이터');if(x.emotion&&!x.emotions)x.emotions=[x.emotion];if(!x.emotions)x.emotions=[];});
const ids=new Set(data.entries.map(e=>e.id)),nw=im.entries.filter(e=>!ids.has(e.id)),bf=data.entries.length;data.entries=[...data.entries,...nw];saveData();updateHeader();bkMsg(`✓ 복원! 기존 ${bf} + 신규 ${nw.length} = ${data.entries.length}건`,'success');renderSet();}catch(err){bkMsg('✕ 실패: '+err.message,'error');}};r.readAsText(f);ev.target.value='';}

async function copyClip(){try{await navigator.clipboard.writeText(JSON.stringify({...data,exportedAt:Date.now()}));bkMsg(`✓ 복사 완료 (${data.entries.length}건)`,'success');}catch(e){const t=document.createElement('textarea');t.value=JSON.stringify({...data});document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);bkMsg('✓ 복사 완료','success');}}

async function pasteClip(){try{let t;try{t=await navigator.clipboard.readText();}catch{t=prompt('데이터 붙여넣기:');}if(!t)return;const im=JSON.parse(t);if(!im.entries)throw new Error('유효하지 않음');im.entries.forEach(e=>{if(e.emotion&&!e.emotions)e.emotions=[e.emotion];if(!e.emotions)e.emotions=[];});
const ids=new Set(data.entries.map(e=>e.id)),nw=im.entries.filter(e=>!ids.has(e.id)),bf=data.entries.length;data.entries=[...data.entries,...nw];saveData();updateHeader();bkMsg(`✓ 복원! 기존 ${bf} + 신규 ${nw.length} = ${data.entries.length}건`,'success');renderSet();}catch(e){bkMsg('✕ 실패: '+e.message,'error');}}

loadData();updateHeader();updateScore(5);renderEmotions();renderAct();renderMeals();
</script>
